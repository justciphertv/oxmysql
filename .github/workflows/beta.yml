name: Create beta release

# Fires on any tag push whose version carries a prerelease identifier
# (e.g. v3.3.0-beta.1, v3.3.0-rc.2, v4.0.0-alpha.0). The stable release
# workflow has a matching exclusion so a single tag never triggers both.
#
# Recommended flow:
#   1. Land changes on the `beta` branch.
#   2. Tag the beta branch tip:  git tag v3.3.0-beta.1 && git push origin v3.3.0-beta.1
#   3. This workflow runs: full test suite → build → upload prerelease zip.
#
# Tagging from any other branch also works as long as the commit passes
# the test suite. The tag hash travels into the banner's build stamp so
# operators installing a beta can tell exactly what they have.

on:
  push:
    tags:
      - 'v*.*.*-*'

permissions:
  contents: write

jobs:
  create-beta-release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Install zip
        run: sudo apt-get update && sudo apt-get install -y zip

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Checkout tagged commit
        uses: actions/checkout@v4
        with:
          # Check out the exact commit the tag points at — unlike the
          # stable workflow we do NOT rebase onto the default branch,
          # because a beta may diverge from `main` / `mariadb-patch`.
          ref: ${{ github.sha }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Start MariaDB fixture
        run: docker compose -f tests/compose.yml up -d --wait

      - name: Run test suite
        run: bun run test

      - name: Tear down MariaDB fixture
        if: always()
        run: docker compose -f tests/compose.yml down -v

      - name: Run build script
        run: bun run build
        env:
          # build.js rewrites package.json.version to this value (with the
          # leading 'v' stripped) before building — keeps the fxmanifest
          # version and the git build stamp consistent with the tag name.
          TGT_RELEASE_VERSION: ${{ github.ref_name }}

      - name: Bundle files
        run: |
          mkdir -p ./temp/oxmysql/{web,lib}
          cp ./{LICENSE,README.md,fxmanifest.lua,ui.lua} ./temp/oxmysql
          cp ./lib/MySQL.lua ./temp/oxmysql/lib
          cp -r ./dist ./logger ./temp/oxmysql
          cp -r ./web/build ./temp/oxmysql/web/
          cd ./temp && zip -r ../oxmysql.zip ./oxmysql

      - name: Create beta release
        uses: 'marvinpinto/action-automatic-releases@v1.2.1'
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          # Always marked as prerelease — a beta / rc / alpha tag should
          # not appear as the "latest" release on the repo landing page.
          prerelease: true
          automatic_release_tag: ${{ github.ref_name }}
          title: ${{ github.ref_name }}
          files: oxmysql.zip

      # Intentionally omitted vs. the stable workflow:
      # - No "Push version bump" commit back to the default branch. A beta
      #   should not alter mariadb-patch's package.json version; only a
      #   stable release does that.
      # - No `EndBug/latest-tag@v1` update. Stable releases own the
      #   "latest" symlink; betas never take it.
